name: CI Checks
on: [pull_request]

jobs:
  lint:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - uses: gradle/actions/setup-gradle@v4

      - name: Run Linter
        run: ./gradlew ktlintCheck

  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - uses: gradle/actions/setup-gradle@v4

      - name: Build with Gradle
        run: ./gradlew assemble

  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - uses: gradle/actions/setup-gradle@v4

      - name: Run Unit Tests (Controllers)
        run: ./gradlew test --tests "*ControllerTest"

      - name: Run Unit Tests (Services)
        run: ./gradlew test --tests "*ServiceTest"

      - name: Run Unit Tests (Repositories)
        run: ./gradlew test --tests "*RepositoryImplTest"

      - name: Run Integration Tests
        run: ./gradlew test --tests "*IntegrationTest"