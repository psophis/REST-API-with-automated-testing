name: CI Checks
on: [pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: temurin
          java-version: 21

      - uses: gradle/actions/setup-gradle@ed408507eac070d1f99cc633dbcf757c94c7933a # v4

      - name: Build with Gradle
        run: ./gradlew assemble

  ktlint:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: temurin
          java-version: 21

      - uses: gradle/actions/setup-gradle@ed408507eac070d1f99cc633dbcf757c94c7933a # v4

      - name: Run Ktlint
        run: ./gradlew ktlintCheck --continue

  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
      checks: write
      pull-requests: write

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: temurin
          java-version: 21

      - uses: gradle/actions/setup-gradle@ed408507eac070d1f99cc633dbcf757c94c7933a # v4

      - name: Run tests
        run: ./gradlew test --continue

      - name: Run contract tests
        if: ${{ !cancelled() }}
        run: ./gradlew contractTest --continue

      - name: Publish Test Coverage Report
        uses: madrapps/jacoco-report@e51ce1f46f7f8b5331593f935e59cbaf44b84920 # v1.8.0
        if: ${{ !cancelled() }}
        with:
          paths: |
            ${{ github.workspace }}/**/build/reports/jacoco/test/jacocoTestReport.xml
          token: ${{ secrets.GITHUB_TOKEN }}
          title: Code Coverage
          update-comment: true
          comment-type: both
          min-coverage-overall: 0
          min-coverage-changed-files: 0

      - name: Convert JUnit reports to CTRF
        if: ${{ !cancelled() }}
        run: npx junit-to-ctrf "**/build/test-results/*/TEST-*.xml"

      - name: Publish Test Report
        uses: ctrf-io/github-test-reporter@e500b992f936420eb633c91644cf10d4d71df700 # v1
        if: ${{ !cancelled() }}
        with:
          report-path: "./ctrf/*.json"
          summary-report: true
          failed-report: true
          slowest-report: true
          flaky-rate-report: false
          pull-request: true
          update-comment: true
          upload-artifact: true
          status-check: true
          status-check-name: "Test Report"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
